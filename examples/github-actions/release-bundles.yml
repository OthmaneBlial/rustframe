name: Release RustFrame Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  bundle:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev
          fi

      - name: Run host checks
        run: cargo run -p rustframe-cli -- doctor

      - name: Package and verify app
        run: cargo run -p rustframe-cli -- package my-app --verify

      - name: Sign or notarize bundle
        run: echo "Add platform signing/notarization steps here before publishing artifacts."

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-app-${{ runner.os }}
          path: apps/my-app/dist/**
